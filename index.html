<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Accueil - Designateur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="dataManager.js"></script>
    
    <style>
        :root {
            --primary-color: #375a7f;
            --secondary-color: #00bc8c;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --bg-dark: #222222;
            --card-dark: #303030;
            --text-light: #ebebeb;
            --boy-color: #3498db;
            --girl-color: #e74c3c;
        }
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-light);
            padding-bottom: 80px; 
        }
        
        .navbar { background-color: #1a1a1a !important; border-bottom: 1px solid #333; }
        .navbar-brand { color: var(--secondary-color) !important; }
        .navbar-nav .nav-link { color: #ccc !important; }
        .navbar-nav .nav-link.active { color: var(--secondary-color) !important; font-weight: 700; }

        /* Plaquettes réduites et allongées */
        .stat-card-global {
            background: var(--card-dark); border-radius: 12px;
            padding: 10px 5px; text-align: center; border: 1px solid #444;
            transition: transform 0.3s;
        }
        .stat-card-global:hover { transform: translateY(-3px); border-color: var(--secondary-color); }
        .stat-number-big { font-size: 1.4rem; font-weight: 800; color: var(--secondary-color); line-height: 1.2; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: #888; margin-top: 2px; letter-spacing: 0.5px; }

        .class-summary-card {
            background: var(--card-dark); border-radius: 15px; border: 1px solid #444;
            margin-bottom: 15px; overflow: hidden;
        }
        .class-summary-header {
            background: rgba(55, 90, 127, 0.2); padding: 10px 15px;
            border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center;
        }
        
        .shortcut-btn {
            height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; border-radius: 20px; text-decoration: none; transition: all 0.3s;
            border: 2px solid transparent;
        }
        .shortcut-design { background: rgba(0, 188, 140, 0.1); color: var(--secondary-color); border-color: rgba(0, 188, 140, 0.2); }
        .shortcut-config { background: rgba(55, 90, 127, 0.1); color: #5dade2; border-color: rgba(55, 90, 127, 0.2); }
        .shortcut-btn:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* Couleurs spécifiques demandées */
        .text-boy { color: var(--boy-color) !important; }
        .text-girl { color: var(--girl-color) !important; }

        .footer-credits {
            margin-top: 40px; 
            font-size: 0.85rem; 
            color: #888; 
            padding: 20px;
            border-top: 1px solid #444;
            text-align: center;
        }
        .table-dark-custom { --bs-table-bg: #303030; color: white; border-color: #444; font-size: 0.8rem; margin-bottom: 0; }
        .table-dark-custom th { color: #888; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; border-bottom: 1px solid #444; }
        .table-dark-custom td { border-bottom: 1px solid #3a3a3a; padding: 6px 4px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold mb-0" href="index.html" style="color: var(--secondary-color);">DESIGNATEUR 🇧🇯</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="designer.html">Désignation</a></li>
                    <li class="nav-item"><a class="nav-link" href="configuration.html">Configuration</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <a href="designer.html" class="shortcut-btn shortcut-design">
                    <span class="display-6">🎯</span>
                    <h5 class="fw-bold mt-2">DÉSIGNATION</h5>
                </a>
            </div>
            <div class="col-md-6">
                <a href="configuration.html" class="shortcut-btn shortcut-config">
                    <span class="display-6">⚙️</span>
                    <h5 class="fw-bold mt-2">CONFIGURATION</h5>
                </a>
            </div>
        </div>

        <h6 class="mb-3 fw-bold text-secondary text-uppercase" style="letter-spacing: 1px;">📊 Statistiques Globales</h6>
        <div class="row g-2 mb-4" id="globalStatsContainer">
            <div class="col-3">
                <div class="stat-card-global">
                    <div class="stat-number-big" id="g-total">00</div>
                    <div class="stat-label">Total</div>
                </div>
            </div>
            <div class="col-3">
                <div class="stat-card-global">
                    <div class="stat-number-big text-boy" id="g-m">00</div>
                    <div class="stat-label">Garçons (M)</div>
                </div>
            </div>
            <div class="col-3">
                <div class="stat-card-global">
                    <div class="stat-number-big text-girl" id="g-f">00</div>
                    <div class="stat-label">Filles (F)</div>
                </div>
            </div>
            <div class="col-3">
                <div class="stat-card-global">
                    <div class="stat-number-big text-danger" id="g-abs">00</div>
                    <div class="stat-label">Absents</div>
                </div>
            </div>
        </div>

        <h6 class="mb-3 fw-bold text-secondary text-uppercase" style="letter-spacing: 1px;">🏫 Récapitulatif par classe</h6>
        <div id="classesSummaryContainer"></div>

        <div class="footer-credits">
            Concepteur : <strong>Atizoun Plateny AMOUSSOU</strong><br>
            Email : atizoun@gmail.com | Tél : 01 97 74 40 35
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let appData = (typeof DataManager !== 'undefined') ? DataManager.load() : (JSON.parse(localStorage.getItem('designateur_data')) || { classes: {} });

        function calculateStats() {
            let gTotal = 0, gM = 0, gF = 0, gAbs = 0;
            const container = document.getElementById('classesSummaryContainer');
            container.innerHTML = "";

            const keys = Object.keys(appData.classes);
            if(keys.length === 0) {
                container.innerHTML = `<div class="card bg-dark border-secondary p-4 text-center text-muted small">Aucune classe enregistrée.</div>`;
                return;
            }

            keys.forEach(className => {
                const cls = appData.classes[className];
                const students = cls.students;
                
                const cTotal = students.length;
                const cM = students.filter(s => s.sexe === 'M').length;
                const cF = students.filter(s => s.sexe === 'F').length;
                
                const cAbs = students.filter(s => s.absent).length;
                const cAbsM = students.filter(s => s.absent && s.sexe === 'M').length;
                const cAbsF = students.filter(s => s.absent && s.sexe === 'F').length;

                const cPre = cTotal - cAbs;
                const cPreM = cM - cAbsM;
                const cPreF = cF - cAbsF;

                gTotal += cTotal; gM += cM; gF += cF;
                gAbs += cAbs;

                const fmt = (val) => val.toString().padStart(2, '0');

                container.innerHTML += `
                    <div class="class-summary-card">
                        <div class="class-summary-header">
                            <span class="fw-bold text-uppercase small" style="color: var(--secondary-color);">${className}</span>
                            <span class="badge bg-secondary" style="font-size: 0.7rem;">${cTotal} Elèves</span>
                        </div>
                        <div class="p-2">
                            <table class="table table-dark table-dark-custom text-center mb-0" style="table-layout: fixed; width: 100%;">
                                <thead>
                                    <tr>
                                        <th class="text-start" style="width: 35%;">ETAT</th>
                                        <th class="text-boy fw-bold" style="width: 20%; font-size: 0.95rem;">G</th>
                                        <th class="text-girl fw-bold" style="width: 20%; font-size: 0.95rem;">F</th>
                                        <th class="fw-bold text-white" style="width: 25%; font-size: 0.95rem;">T</th>
                                    </tr>
                                </thead>
                                <tbody style="font-size: 1rem;">
                                    <tr>
                                        <td class="text-start fw-bold text-white small">INSCRITS</td>
                                        <td class="text-boy fw-bold" style="font-size: 1.1rem;">${fmt(cM)}</td>
                                        <td class="text-girl fw-bold" style="font-size: 1.1rem;">${fmt(cF)}</td>
                                        <td class="fw-bold text-white" style="font-size: 1.1rem;">${fmt(cTotal)}</td>
                                    </tr>
                                    <tr>
                                        <td class="text-start fw-bold text-white small">PRÉSENTS</td>
                                        <td class="text-boy fw-bold">${fmt(cPreM)}</td>
                                        <td class="text-girl fw-bold">${fmt(cPreF)}</td>
                                        <td class="fw-bold text-white">${fmt(cPre)}</td>
                                    </tr>
                                    <tr style="border-bottom: none;">
                                        <td class="text-start fw-bold text-white small">ABSENTS</td>
                                        <td class="text-boy fw-bold">${fmt(cAbsM)}</td>
                                        <td class="text-girl fw-bold">${fmt(cAbsF)}</td>
                                        <td class="text-danger fw-bold" style="font-size: 1.1rem;">${fmt(cAbs)}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            });

            document.getElementById('g-total').innerText = gTotal.toString().padStart(2, '0');
            document.getElementById('g-m').innerText = gM.toString().padStart(2, '0');
            document.getElementById('g-f').innerText = gF.toString().padStart(2, '0');
            document.getElementById('g-abs').innerText = gAbs.toString().padStart(2, '0');
        }

        // PWA: Service Worker registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js').then(function(registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }).catch(function(error) {
                    console.log('ServiceWorker registration failed: ', error);
                });
            });
        }

        window.onload = calculateStats;
    </script>
</body>
</html>
