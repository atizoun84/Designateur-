<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Designateur SPA - Bénin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Designateur">
    <link rel="apple-touch-icon" href="logoapp.png">
    <link rel="icon" type="image/png" href="logoapp.png">
    
    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #198754;
        }
        body { background-color: #f8f9fa; }
        .view { display: none; }
        .view.active { display: block; }
        
        /* Bouton désigner style circulaire */
        .btn-design {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(25, 135, 84, 0.3);
            transition: transform 0.2s;
        }
        .btn-design:active { transform: scale(0.95); }
        
        .result-box {
            border: 4px solid var(--primary-color);
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            background: white;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        
        .result-box:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        /* Animation pour le défilement des noms */
        @keyframes nameFlash {
            0% { opacity: 0.3; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.3; transform: scale(0.95); }
        }
        
        .name-scroll {
            animation: nameFlash 0.05s ease-in-out;
        }
        
        .winner-final {
            animation: winnerAppear 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        
        @keyframes winnerAppear {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            50% { opacity: 0.8; transform: scale(1.2) rotate(5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        
        /* Bouton avec animation pendant le tirage */
        .btn-design-loading {
            animation: buttonPulse 0.3s infinite;
            cursor: wait !important;
        }
        
        @keyframes buttonPulse {
            0% { transform: scale(1); box-shadow: 0 10px 20px rgba(25, 135, 84, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 15px 30px rgba(25, 135, 84, 0.5); }
            100% { transform: scale(1); box-shadow: 0 10px 20px rgba(25, 135, 84, 0.3); }
        }
        
        /* Overlay de succès plein écran transparent */
        #success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(25, 135, 84, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.3s ease;
        }
        
        /* Animation pour le son (effet visuel) */
        @keyframes soundWave {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        .sound-wave {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            animation: soundWave 0.5s ease-out forwards;
            z-index: 10000;
        }
        
        /* Modal d'appréciation */
        .appreciation-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        
        .appreciation-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: modalAppear 0.3s ease-out;
        }
        
        @keyframes modalAppear {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .appreciation-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .appreciation-btn {
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .appreciation-btn:hover { transform: scale(1.05); }
        
        .appreciation-mediocre { background-color: #dc3545; color: white; }
        .appreciation-passable { background-color: #fd7e14; color: white; }
        .appreciation-bien { background-color: #198754; color: white; }
        
        .color-mediocre { color: #dc3545; }
        .color-passable { color: #fd7e14; }
        .color-bien { color: #198754; }
        
        .bg-mediocre-light { background-color: rgba(220, 53, 69, 0.1); }
        .bg-passable-light { background-color: rgba(253, 126, 20, 0.1); }
        .bg-bien-light { background-color: rgba(25, 135, 84, 0.1); }
        
        .appreciation-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 10px;
        }
        
        /* Modal de confirmation sans affichage du code */
        .secret-confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10002;
        }
        
        .secret-confirm-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        
        .secret-input {
            font-size: 2rem;
            text-align: center;
            letter-spacing: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="success-overlay">
        <div class="text-center">
            <div class="display-1">✅</div>
            <h2 class="fw-bold">Classe enregistrée avec succès !</h2>
        </div>
    </div>
    
    <!-- Modal d'appréciation -->
    <div id="appreciationModal" class="appreciation-modal">
        <div class="appreciation-content">
            <h3 id="modalStudentName" class="mb-3"></h3>
            <p class="text-muted mb-3">Choisissez une appréciation</p>
            <div class="appreciation-buttons">
                <button class="appreciation-btn appreciation-mediocre" onclick="setAppreciation('mediocre')">🔴 Médiocre</button>
                <button class="appreciation-btn appreciation-passable" onclick="setAppreciation('passable')">🟠 Passable</button>
                <button class="appreciation-btn appreciation-bien" onclick="setAppreciation('bien')">🟢 Très bien</button>
            </div>
            <button onclick="closeModal()" class="btn btn-secondary mt-3">Annuler</button>
        </div>
    </div>
    
    <!-- Modal de confirmation secrète -->
    <div id="secretConfirmModal" class="secret-confirm-modal">
        <div class="secret-confirm-content">
            <h3 class="mb-3">⚠️ Action irréversible</h3>
            <p class="text-muted mb-3">Confirmation requise</p>
            <input type="password" id="secretCodeInput" class="form-control secret-input mb-3" placeholder="•••••" maxlength="5" autocomplete="off">
            <div class="d-flex gap-2">
                <button onclick="validateSecretCode()" class="btn btn-danger flex-grow-1">Confirmer</button>
                <button onclick="closeSecretModal()" class="btn btn-secondary flex-grow-1">Annuler</button>
            </div>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">DESIGNATEUR 🇧🇯</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" onclick="showView('design-view')">Désigner</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showView('config-view')">Configuration</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        
        <section id="design-view" class="view active">
            <div class="row justify-content-center">
                <div class="col-md-6 text-center">
                    <select id="classSelect" class="form-select form-select-lg mb-4 shadow-sm" onchange="loadClassData()">
                        <option value="">-- Sélectionnez une Classe --</option>
                    </select>

                    <div class="row mb-4 g-2">
                        <div class="col-4">
                            <div class="bg-white p-2 rounded shadow-sm">
                                <small class="text-muted d-block">Effectif</small>
                                <strong id="stat-total" class="h5">0</strong>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="bg-white p-2 rounded shadow-sm">
                                <small class="text-muted d-block">Restants</small>
                                <strong id="stat-remaining" class="h5 text-danger">0</strong>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="bg-white p-2 rounded shadow-sm">
                                <small class="text-muted d-block">Dernier</small>
                                <strong id="stat-last" class="text-truncate d-block small">-</strong>
                            </div>
                        </div>
                    </div>

                    <div class="result-box mb-4 shadow-sm p-3" onclick="openAppreciationModal()">
                        <div>
                            <h2 id="winner-name" class="display-6 fw-bold text-primary">PRÊT ?</h2>
                            <p id="winner-count" class="text-muted mb-0"></p>
                            <div id="appreciation-badge" class="appreciation-badge"></div>
                        </div>
                    </div>

                    <button onclick="pickStudent()" id="designButton" class="btn btn-success btn-design shadow mb-4">
                        Désigner un élève
                    </button>

                    <div class="d-flex gap-2 justify-content-center">
                        <button class="btn btn-outline-warning btn-sm" onclick="resetSession()">Réinitialiser Session</button>
                        <button class="btn btn-outline-secondary btn-sm" onclick="openSecretModal()">Vider l'historique</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="config-view" class="view">
            <div class="row">
                <div class="col-md-5">
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-success text-white font-weight-bold">Créer ou Importer une Classe</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label small">Nom de la Classe :</label>
                                <input type="text" id="classNameInput" class="form-control" placeholder="Ex: 6ème A, 4M3">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small">Importer Fichier Excel (.xlsx, .xls) :</label>
                                <input type="file" id="excelInput" class="form-control" accept=".xlsx, .xls">
                                <small class="text-muted">Colonnes requises : [Nom Prénoms] et [sexe]</small>
                            </div>
                            <button class="btn btn-primary w-100" onclick="saveClass()">Enregistrer la Classe</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="card shadow-sm">
                        <div class="card-header bg-success text-white">Classes Disponibles</div>
                        <ul class="list-group list-group-flush" id="classesDisplayList">
                            </ul>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // --- LOGIQUE SPA ET DONNÉES ---
        let appData = JSON.parse(localStorage.getItem('designateur_data')) || { classes: {} };
        let currentClass = null;
        let pool = [];
        let isPicking = false;
        let audioContext = null;
        let tickInterval = null;
        let currentSelectedStudent = null;
        let pendingAction = null; // Stocke l'action à confirmer
        
        // Code secret (non affiché)
        const SECRET_CODE = "11984";
        
        // Initialiser l'audio context
        function initAudio() {
            if (!audioContext && window.AudioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        // Ouvrir la modal secrète
        function openSecretModal() {
            document.getElementById('secretConfirmModal').style.display = 'flex';
            document.getElementById('secretCodeInput').value = '';
            document.getElementById('secretCodeInput').focus();
            pendingAction = 'clearHistory';
        }
        
        // Fermer la modal secrète
        function closeSecretModal() {
            document.getElementById('secretConfirmModal').style.display = 'none';
            pendingAction = null;
        }
        
        // Valider le code secret
        function validateSecretCode() {
            const inputCode = document.getElementById('secretCodeInput').value;
            if (inputCode === SECRET_CODE) {
                if (pendingAction === 'clearHistory') {
                    executeClearHistory();
                }
                closeSecretModal();
            } else {
                alert("Code incorrect");
                document.getElementById('secretCodeInput').value = '';
            }
        }
        
        // Exécuter la suppression de l'historique
        function executeClearHistory() {
            if(currentClass) {
                currentClass.history = [];
                currentClass.students.forEach(s => {
                    s.count = 0;
                    s.appreciations = [];
                });
                localStorage.setItem('designateur_data', JSON.stringify(appData));
                updateUI();
                document.getElementById('winner-name').innerText = "PRÊT ?";
                updateAppreciationBadge(null);
                
                // Notification
                const overlay = document.getElementById('success-overlay');
                overlay.style.background = 'rgba(220, 53, 69, 0.85)';
                overlay.style.display = 'flex';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    overlay.style.background = 'rgba(25, 135, 84, 0.85)';
                }, 1500);
            }
        }
        
        // Jouer le son de timbale
        function playTimpaniSound() {
            if (!audioContext) return;
            
            const gainNode = audioContext.createGain();
            gainNode.gain.value = 0.6;
            gainNode.connect(audioContext.destination);
            
            const osc1 = audioContext.createOscillator();
            osc1.type = 'sine';
            osc1.frequency.value = 80;
            osc1.connect(gainNode);
            
            const osc2 = audioContext.createOscillator();
            osc2.type = 'sine';
            osc2.frequency.value = 120;
            osc2.connect(gainNode);
            
            osc1.start();
            osc2.start();
            
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.8);
            osc1.stop(audioContext.currentTime + 0.8);
            osc2.stop(audioContext.currentTime + 0.8);
            
            for(let i = 0; i < 2; i++) {
                setTimeout(() => {
                    const wave = document.createElement('div');
                    wave.className = 'sound-wave';
                    wave.style.background = 'rgba(25, 135, 84, 0.6)';
                    document.body.appendChild(wave);
                    setTimeout(() => wave.remove(), 500);
                }, i * 100);
            }
        }
        
        function playTickSound() {
            if (!audioContext) return;
            
            const gainNode = audioContext.createGain();
            gainNode.gain.value = 0.4;
            gainNode.connect(audioContext.destination);
            
            const oscillator = audioContext.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.value = 1200;
            oscillator.connect(gainNode);
            
            const oscillator2 = audioContext.createOscillator();
            oscillator2.type = 'triangle';
            oscillator2.frequency.value = 600;
            oscillator2.connect(gainNode);
            
            oscillator.start();
            oscillator2.start();
            
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.05);
            oscillator.stop(audioContext.currentTime + 0.05);
            oscillator2.stop(audioContext.currentTime + 0.05);
            
            const wave = document.createElement('div');
            wave.className = 'sound-wave';
            document.body.appendChild(wave);
            setTimeout(() => wave.remove(), 300);
        }
        
        function playFinalSound() {
            if (!audioContext) return;
            
            const gainNode = audioContext.createGain();
            gainNode.gain.value = 0.5;
            gainNode.connect(audioContext.destination);
            
            const osc1 = audioContext.createOscillator();
            osc1.type = 'sine';
            osc1.frequency.value = 330;
            osc1.connect(gainNode);
            
            const osc2 = audioContext.createOscillator();
            osc2.type = 'sine';
            osc2.frequency.value = 523.25;
            osc2.connect(gainNode);
            
            osc1.start();
            osc2.start();
            
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
            osc1.stop(audioContext.currentTime + 0.3);
            osc2.stop(audioContext.currentTime + 0.3);
            
            for(let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const wave = document.createElement('div');
                    wave.className = 'sound-wave';
                    wave.style.width = (100 + i * 30) + 'px';
                    wave.style.height = (100 + i * 30) + 'px';
                    document.body.appendChild(wave);
                    setTimeout(() => wave.remove(), 500);
                }, i * 50);
            }
        }
        
        function stopAllTicks() {
            if (tickInterval) {
                clearInterval(tickInterval);
                tickInterval = null;
            }
        }
        
        function getMajorityColor(appreciations) {
            if (!appreciations || appreciations.length === 0) return null;
            const counts = { mediocre: 0, passable: 0, bien: 0 };
            appreciations.forEach(grade => {
                if (counts[grade] !== undefined) counts[grade]++;
            });
            let maxCount = 0;
            let majority = null;
            for (let [grade, count] of Object.entries(counts)) {
                if (count > maxCount) {
                    maxCount = count;
                    majority = grade;
                }
            }
            return majority;
        }
        
        function updateAppreciationBadge(studentName) {
            const badge = document.getElementById('appreciation-badge');
            if (!studentName || !currentClass) {
                badge.innerHTML = '';
                badge.className = 'appreciation-badge';
                return;
            }
            const student = currentClass.students.find(s => s.name === studentName);
            if (student && student.appreciations && student.appreciations.length > 0) {
                const majority = getMajorityColor(student.appreciations);
                if (majority === 'mediocre') {
                    badge.innerHTML = '🎓 Appréciation majoritaire : Médiocre';
                    badge.className = 'appreciation-badge bg-mediocre-light color-mediocre';
                } else if (majority === 'passable') {
                    badge.innerHTML = '🎓 Appréciation majoritaire : Passable';
                    badge.className = 'appreciation-badge bg-passable-light color-passable';
                } else if (majority === 'bien') {
                    badge.innerHTML = '🎓 Appréciation majoritaire : Très bien';
                    badge.className = 'appreciation-badge bg-bien-light color-bien';
                }
            } else {
                badge.innerHTML = '';
                badge.className = 'appreciation-badge';
            }
        }
        
        function openAppreciationModal() {
            const winnerName = document.getElementById('winner-name').innerText;
            if (!currentClass || winnerName === 'PRÊT ?') return;
            currentSelectedStudent = currentClass.students.find(s => s.name === winnerName);
            if (currentSelectedStudent) {
                document.getElementById('modalStudentName').innerHTML = `${winnerName}<br><small class="text-muted">Notez sa réponse</small>`;
                document.getElementById('appreciationModal').style.display = 'flex';
            }
        }
        
        function closeModal() {
            document.getElementById('appreciationModal').style.display = 'none';
            currentSelectedStudent = null;
        }
        
        function setAppreciation(grade) {
            if (currentSelectedStudent) {
                if (!currentSelectedStudent.appreciations) currentSelectedStudent.appreciations = [];
                currentSelectedStudent.appreciations.push(grade);
                localStorage.setItem('designateur_data', JSON.stringify(appData));
                
                const wave = document.createElement('div');
                wave.className = 'sound-wave';
                wave.style.background = grade === 'mediocre' ? 'rgba(220,53,69,0.5)' : (grade === 'passable' ? 'rgba(253,126,20,0.5)' : 'rgba(25,135,84,0.5)');
                document.body.appendChild(wave);
                setTimeout(() => wave.remove(), 500);
                
                updateAppreciationBadge(currentSelectedStudent.name);
                closeModal();
                
                const overlay = document.getElementById('success-overlay');
                overlay.style.background = grade === 'mediocre' ? 'rgba(220,53,69,0.85)' : (grade === 'passable' ? 'rgba(253,126,20,0.85)' : 'rgba(25,135,84,0.85)');
                overlay.style.display = 'flex';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    overlay.style.background = 'rgba(25, 135, 84, 0.85)';
                }, 1000);
            }
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(event && event.target && event.target.classList) event.target.classList.add('active');
            if(viewId === 'config-view') renderClassesList();
            if(viewId === 'design-view') updateClassDropdown();
        }

        function saveClass() {
            const name = document.getElementById('classNameInput').value.trim();
            const fileInput = document.getElementById('excelInput');
            if(!name) return alert("Veuillez saisir un nom de classe");
            if(!fileInput.files || fileInput.files.length === 0) return alert("Veuillez choisir un fichier Excel");

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheetName = workbook.SheetNames[0];
                const firstSheet = workbook.Sheets[firstSheetName];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet);

                const formattedStudents = jsonData.map(row => {
                    let nameField = null;
                    let sexeField = null;

                    if(row['Nom Prénoms'] !== undefined) nameField = row['Nom Prénoms'];
                    else if(row['Nom_Prenoms'] !== undefined) nameField = row['Nom_Prenoms'];
                    else if(row['NomPrenoms'] !== undefined) nameField = row['NomPrenoms'];
                    else if(row['NOM_PRENOMS'] !== undefined) nameField = row['NOM_PRENOMS'];
                    else {
                        const keys = Object.keys(row);
                        for(let k of keys) {
                            if(k.toLowerCase().includes('nom') && k.toLowerCase().includes('prénom')) {
                                nameField = row[k];
                                break;
                            } else if(k.toLowerCase().includes('nom') && k.toLowerCase().includes('prenom')) {
                                nameField = row[k];
                                break;
                            }
                        }
                    }

                    if(row['sexe'] !== undefined) sexeField = row['sexe'];
                    else if(row['Sexe'] !== undefined) sexeField = row['Sexe'];
                    else if(row['SEXE'] !== undefined) sexeField = row['SEXE'];
                    else if(row['gender'] !== undefined) sexeField = row['gender'];
                    else {
                        const keys = Object.keys(row);
                        for(let k of keys) {
                            if(k.toLowerCase() === 'sexe') {
                                sexeField = row[k];
                                break;
                            }
                        }
                    }

                    if(!nameField) return null;
                    
                    let normalizedSexe = '';
                    if(sexeField) {
                        normalizedSexe = sexeField.toString().trim().toUpperCase();
                        if(normalizedSexe === 'M' || normalizedSexe === 'F') {
                            normalizedSexe = normalizedSexe;
                        } else if(normalizedSexe === 'MASCULIN') normalizedSexe = 'M';
                        else if(normalizedSexe === 'FÉMININ' || normalizedSexe === 'FEMININ') normalizedSexe = 'F';
                        else normalizedSexe = sexeField.toString().trim();
                    }
                    
                    return {
                        name: nameField.toString().trim(),
                        sexe: normalizedSexe,
                        count: 0,
                        appreciations: []
                    };
                }).filter(s => s !== null && s.name !== "");

                if(formattedStudents.length === 0) return alert("Aucune donnée valide trouvée.");

                appData.classes[name] = {
                    students: formattedStudents,
                    history: []
                };
                
                localStorage.setItem('designateur_data', JSON.stringify(appData));
                
                const overlay = document.getElementById('success-overlay');
                overlay.style.display = 'flex';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 1500);

                document.getElementById('classNameInput').value = "";
                fileInput.value = "";
                
                renderClassesList();
                updateClassDropdown();
            };
            reader.readAsArrayBuffer(fileInput.files[0]);
        }

        function renderClassesList() {
            const listEl = document.getElementById('classesDisplayList');
            listEl.innerHTML = "";
            for(let name in appData.classes) {
                listEl.innerHTML += `
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        ${name} (${appData.classes[name].students.length} élèves)
                        <button class="btn btn-danger btn-sm" onclick="deleteClass('${name}')">Supprimer</button>
                    </li>`;
            }
        }

        function deleteClass(name) {
            if(confirm(`Supprimer la classe ${name} ?`)) {
                delete appData.classes[name];
                localStorage.setItem('designateur_data', JSON.stringify(appData));
                renderClassesList();
                updateClassDropdown();
                if(currentClass && currentClass === appData.classes[name]) {
                    currentClass = null;
                    pool = [];
                    document.getElementById('winner-name').innerText = "PRÊT ?";
                    document.getElementById('winner-count').innerText = "";
                    updateAppreciationBadge(null);
                    updateUI();
                }
            }
        }

        function updateClassDropdown() {
            const select = document.getElementById('classSelect');
            select.innerHTML = '<option value="">-- Sélectionnez une Classe --</option>';
            for(let name in appData.classes) {
                select.innerHTML += `<option value="${name}">${name}</option>`;
            }
        }

        function loadClassData() {
            stopAllTicks();
            const className = document.getElementById('classSelect').value;
            if(!className) return;
            currentClass = appData.classes[className];
            if(currentClass) {
                resetPool();
                updateUI();
                if(currentClass.history && currentClass.history.length > 0) {
                    document.getElementById('stat-last').innerText = currentClass.history[0];
                    updateAppreciationBadge(currentClass.history[0]);
                } else {
                    document.getElementById('stat-last').innerText = "-";
                    updateAppreciationBadge(null);
                }
            }
        }

        function resetPool() {
            if(!currentClass) return;
            pool = currentClass.students.map(s => s.name);
        }

        function updateUI() {
            if(!currentClass) return;
            document.getElementById('stat-total').innerText = currentClass.students.length;
            document.getElementById('stat-remaining').innerText = pool.length;
            const lastStudent = (currentClass.history && currentClass.history.length) ? currentClass.history[0] : "-";
            document.getElementById('stat-last').innerText = lastStudent;
        }

        async function pickStudent() {
            if(isPicking) return;
            if(!currentClass) return alert("Choisissez une classe d'abord");
            if(pool.length === 0) {
                alert("Tous les élèves sont passés ! Réinitialisation du cycle.");
                resetPool();
            }
            if(pool.length === 0) return;
            
            isPicking = true;
            const button = document.getElementById('designButton');
            button.classList.add('btn-design-loading');
            button.disabled = true;
            
            initAudio();
            if (audioContext && audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            
            const winnerElement = document.getElementById('winner-name');
            const possibleNames = [...pool];
            const scrollDuration = 800;
            const scrollInterval = 30;
            let scrollCount = 0;
            const maxScrolls = scrollDuration / scrollInterval;
            
            let tickCount = 0;
            tickInterval = setInterval(() => {
                playTickSound();
                tickCount++;
                if (tickCount > maxScrolls + 3) {
                    stopAllTicks();
                }
            }, 45);
            
            const scrollIntervalId = setInterval(() => {
                if (scrollCount < maxScrolls) {
                    const randomName = possibleNames[Math.floor(Math.random() * possibleNames.length)];
                    winnerElement.innerText = randomName;
                    winnerElement.classList.add('name-scroll');
                    setTimeout(() => winnerElement.classList.remove('name-scroll'), 30);
                    scrollCount++;
                } else {
                    clearInterval(scrollIntervalId);
                    
                    const randomIndex = Math.floor(Math.random() * pool.length);
                    const selectedName = pool.splice(randomIndex, 1)[0];
                    
                    winnerElement.innerText = selectedName;
                    winnerElement.classList.remove('name-scroll');
                    winnerElement.classList.add('winner-final');
                    
                    playTimpaniSound();
                    playFinalSound();
                    
                    if(!currentClass.history) currentClass.history = [];
                    currentClass.history.unshift(selectedName);
                    const student = currentClass.students.find(s => s.name === selectedName);
                    if(student) student.count++;
                    
                    const genderTag = (student && student.sexe) ? ` (${student.sexe})` : "";
                    document.getElementById('winner-count').innerText = `Désigné ${student ? student.count : 0} fois${genderTag}`;
                    
                    updateAppreciationBadge(selectedName);
                    
                    localStorage.setItem('designateur_data', JSON.stringify(appData));
                    updateUI();
                    
                    setTimeout(() => {
                        winnerElement.classList.remove('winner-final');
                    }, 500);
                    
                    button.classList.remove('btn-design-loading');
                    button.disabled = false;
                    isPicking = false;
                }
            }, scrollInterval);
        }

        function resetSession() {
            stopAllTicks();
            if(currentClass) {
                resetPool();
                if(currentClass.history && currentClass.history.length) {
                    currentClass.history = [];
                }
                updateUI();
                document.getElementById('winner-name').innerText = "PRÊT ?";
                document.getElementById('winner-count').innerText = "";
                updateAppreciationBadge(null);
                localStorage.setItem('designateur_data', JSON.stringify(appData));
            }
        }

        // Initialisation
        updateClassDropdown();
        renderClassesList();
        
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker enregistré', reg))
                .catch(err => console.error('Erreur SW:', err));
        }
    </script>
</body>
</html>
